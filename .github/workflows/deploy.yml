name: Deploy to GitHub Pages

on:
  # Trigger the workflow every time you push to the `main` branch
  # Using a different branch name? Replace `main` with your branch’s name
  push:
    branches: [ main ]
  # Allows you to run this workflow manually from the Actions tab on GitHub.
  workflow_dispatch:

# Allow this job to clone the repo and create a page deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4
      - name: Create .env file for Astro build
        run: |
          echo "PUBLIC_WEBSITE_URL=${{ vars.PUBLIC_WEBSITE_URL }}" > .env
          echo "PUBLIC_CONTACT_EMAIL=${{ vars.PUBLIC_CONTACT_EMAIL }}" >> .env
          echo "PUBLIC_YOUTUBE_URL=${{ vars.PUBLIC_YOUTUBE_URL }}" >> .env
          echo "PUBLIC_GITHUB_URL=${{ vars.PUBLIC_GITHUB_URL }}" >> .env
          echo "PUBLIC_INSTAGRAM_URL=${{ vars.PUBLIC_INSTAGRAM_URL }}" >> .env
          echo "PUBLIC_LINKEDIN_URL=${{ vars.PUBLIC_LINKEDIN_URL }}" >> .env
          echo "PUBLIC_TWITTER_URL=${{ vars.PUBLIC_TWITTER_URL }}" >> .env
      - name: Install, build, and upload your site
        uses: withastro/action@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4